<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ming | Personal Page</title>
    <meta name="description" content="Personal web page for Ming featuring a live clock and modern design.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-2 {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            width: 400px;
            height: 400px;
            right: -100px;
            top: -100px;
            animation-delay: -5s;
        }

        .blob-3 {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            width: 300px;
            height: 300px;
            left: -50px;
            bottom: -50px;
            animation-delay: -10s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.1); }
        }

        .container {
            z-index: 1;
            text-align: center;
            perspective: 1000px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 4rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: float 6s ease-in-out infinite;
        }

        .card:hover {
            transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.25rem;
            font-weight: 300;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .timer-container {
            position: relative;
            display: inline-block;
        }

        #clock {
            font-size: 3.5rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #fff;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .date {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1rem;
            opacity: 0.8;
        }

        /* Decorative elements */
        .glow-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--secondary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--secondary);
            top: -5px;
            right: -5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        footer {
            position: absolute;
            bottom: 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <main class="card" id="mainCard">
            <p class="subtitle">Hello, I am</p>
            <h1>Ming</h1>
            
            <div class="timer-container">
                <div class="glow-dot"></div>
                <div id="clock">00:00:00</div>
                <div id="date" class="date">Wednesday, February 25, 2026</div>
            </div>
        </main>
    </div>

    <footer>&copy; 2026 Ming. Crafted with excellence.</footer>

    <script>
        function updateClock() {
            const now = new Date();
            
            // Format time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Mouse tilt effect for card
        const card = document.getElementById('mainCard');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Initial update and interval
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
